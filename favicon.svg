<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Nest (nid) -->
  <path d="M6 20c0 6 4.5 9 10 9s10-3 10-9" fill="none" stroke="#8B7355" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M4 18c0 7 5.5 11 12 11s12-4 12-11" fill="none" stroke="#A0896C" stroke-width="2" stroke-linecap="round"/>
  <path d="M8 21c0 4.5 3.5 6.5 8 6.5s8-2 8-6.5" fill="none" stroke="#6B5B45" stroke-width="2" stroke-linecap="round"/>
  <!-- Twigs sticking out -->
  <line x1="5" y1="19" x2="2" y2="15" stroke="#A0896C" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="27" y1="19" x2="30" y2="14" stroke="#A0896C" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Eggs -->
  <ellipse cx="12" cy="18" rx="3" ry="3.8" fill="#faf7f2" stroke="#d4c5a9" stroke-width="1.2" transform="rotate(-8 12 18)"/>
  <ellipse cx="20" cy="18" rx="3" ry="3.8" fill="#faf7f2" stroke="#d4c5a9" stroke-width="1.2" transform="rotate(8 20 18)"/>
  <ellipse cx="16" cy="17" rx="3" ry="4" fill="#faf7f2" stroke="#d4c5a9" stroke-width="1.2"/>
  <!-- Perched bird (simple) -->
  <circle cx="16" cy="7" r="3.5" fill="#5a5450"/>
  <ellipse cx="16" cy="12" rx="4.5" ry="3.5" fill="#5a5450"/>
  <!-- Eye -->
  <circle cx="17.5" cy="6.5" r="0.8" fill="#faf7f2"/>
  <!-- Beak -->
  <polygon points="19.5,7.5 21.5,7 19.5,6.5" fill="#d4a017"/>
</svg>
